<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.2rem;
      letter-spacing: 4px;
      margin-bottom: 1rem;
      color: #e94560;
    }

    #status {
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
      min-height: 1.5em;
      color: #a8dadc;
      letter-spacing: 1px;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #score {
      display: flex;
      gap: 2rem;
      margin-top: 1.8rem;
      font-size: 1rem;
      letter-spacing: 1px;
    }

    .score-box {
      text-align: center;
    }

    .score-box span {
      display: block;
      font-size: 1.8rem;
      font-weight: bold;
    }

    .score-box.x-score span { color: #e94560; }
    .score-box.tie-score span { color: #ccc; }
    .score-box.o-score span { color: #a8dadc; }

    #restart {
      margin-top: 1.8rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      border: 2px solid #e94560;
      background: transparent;
      color: #e94560;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: background 0.2s, color 0.2s;
    }

    #restart:hover {
      background: #e94560;
      color: #fff;
    }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>
  <div id="status">Player X's turn</div>
  <div id="board"></div>
  <div id="score">
    <div class="score-box x-score">X<span id="score-x">0</span></div>
    <div class="score-box tie-score">Ties<span id="score-tie">0</span></div>
    <div class="score-box o-score">O<span id="score-o">0</span></div>
  </div>
  <button id="restart">NEW GAME</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, over;
    let scores = { X: 0, O: 0, tie: 0 };

    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      over = false;
      statusEl.textContent = `Player X's turn`;
      renderBoard();
    }

    function renderBoard() {
      boardEl.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ` ${val.toLowerCase()} taken` : '');
        cell.textContent = val || '';
        cell.addEventListener('click', () => handleClick(i));
        boardEl.appendChild(cell);
      });
    }

    function handleClick(i) {
      if (over || board[i]) return;
      board[i] = current;
      const winLine = checkWin();
      if (winLine) {
        over = true;
        scores[current]++;
        updateScore();
        statusEl.textContent = `Player ${current} wins!`;
        highlight(winLine);
      } else if (board.every(Boolean)) {
        over = true;
        scores.tie++;
        updateScore();
        statusEl.textContent = `It's a tie!`;
        renderBoard();
      } else {
        current = current === 'X' ? 'O' : 'X';
        statusEl.textContent = `Player ${current}'s turn`;
        renderBoard();
      }
    }

    function checkWin() {
      return WINS.find(([a, b, c]) =>
        board[a] && board[a] === board[b] && board[a] === board[c]
      ) || null;
    }

    function highlight(line) {
      renderBoard();
      line.forEach(i => boardEl.children[i].classList.add('win'));
    }

    function updateScore() {
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-tie').textContent = scores.tie;
    }

    document.getElementById('restart').addEventListener('click', init);

    init();
  </script>
</body>
</html>
