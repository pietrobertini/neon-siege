<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON SIEGE</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #wrap {
    position: relative;
    width: 800px;
    height: 600px;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
  }
  /* Scanline overlay */
  #wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 2px,
      rgba(0,0,0,0.18) 2px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 10;
  }
  #menu, #gameover, #howto {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.82);
    z-index: 5;
    color: #0ff;
  }
  .hidden { display: none !important; }
  h1 {
    font-size: 3.4rem;
    letter-spacing: 10px;
    color: #0ff;
    text-shadow: 0 0 20px #0ff, 0 0 40px #0af;
    margin-bottom: 0.3rem;
  }
  .subtitle {
    font-size: 0.9rem;
    letter-spacing: 4px;
    color: #0af;
    margin-bottom: 2.5rem;
    text-shadow: 0 0 8px #0af;
  }
  .btn {
    background: transparent;
    border: 2px solid #0ff;
    color: #0ff;
    font-family: monospace;
    font-size: 1.1rem;
    letter-spacing: 4px;
    padding: 0.6rem 2.5rem;
    cursor: pointer;
    margin: 0.4rem;
    text-shadow: 0 0 8px #0ff;
    box-shadow: 0 0 10px #0af inset, 0 0 10px #0af;
    transition: background 0.15s, color 0.15s;
  }
  .btn:hover {
    background: #0ff;
    color: #000;
    box-shadow: 0 0 20px #0ff inset, 0 0 20px #0ff;
  }
  #gameover h2 {
    font-size: 2.5rem;
    color: #f44;
    text-shadow: 0 0 20px #f44;
    letter-spacing: 6px;
    margin-bottom: 1rem;
  }
  #goScore, #goLevel {
    font-size: 1.2rem;
    color: #aff;
    margin: 0.2rem 0;
    letter-spacing: 2px;
  }
  #goScore { margin-bottom: 1.8rem; }
  #howto h2 {
    font-size: 1.8rem;
    letter-spacing: 6px;
    margin-bottom: 1.2rem;
    color: #0ff;
    text-shadow: 0 0 12px #0ff;
  }
  #howto p {
    color: #aff;
    letter-spacing: 2px;
    margin: 0.3rem 0;
    font-size: 0.95rem;
  }
  #howto .key { color: #ff0; text-shadow: 0 0 6px #ff0; }
  #howto { gap: 0; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="800" height="600"></canvas>

  <div id="menu">
    <h1>NEON SIEGE</h1>
    <div class="subtitle">TOP-DOWN SHOOTER</div>
    <button class="btn" id="btnPlay">PLAY</button>
    <button class="btn" id="btnHow">HOW TO PLAY</button>
  </div>

  <div id="howto" class="hidden">
    <h2>HOW TO PLAY</h2>
    <p><span class="key">ARROW KEYS</span> — Move</p>
    <p><span class="key">MOUSE</span> — Aim</p>
    <p><span class="key">LEFT CLICK</span> — Shoot</p>
    <p style="margin-top:1rem; color:#888">Survive each wave to advance levels.</p>
    <p style="color:#888">Kill all enemies to clear the wave.</p>
    <p style="color:#888">Don't let them touch you!</p>
    <button class="btn" id="btnBack" style="margin-top:1.5rem">BACK</button>
  </div>

  <div id="gameover" class="hidden">
    <h2>GAME OVER</h2>
    <div id="goLevel">LEVEL: 1</div>
    <div id="goScore">SCORE: 0</div>
    <button class="btn" id="btnReplay">PLAY AGAIN</button>
    <button class="btn" id="btnMenu">MENU</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

// --- State ---
let state = 'MENU'; // MENU, PLAYING, LEVEL_CLEAR, GAME_OVER
let score = 0, level = 1;
let levelClearTimer = 0;
const LEVEL_CLEAR_DURATION = 2200;

// --- Input ---
const keys = {};
const mouse = { x: W/2, y: H/2, down: false };
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (W / r.width);
  mouse.y = (e.clientY - r.top) * (H / r.height);
});
canvas.addEventListener('mousedown', e => { if (e.button === 0) mouse.down = true; });
canvas.addEventListener('mouseup', e => { if (e.button === 0) mouse.down = false; });
window.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key) && e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.key] = false; });

// --- Player ---
const PLAYER_SPEED = 180;
const FIRE_RATE = 150; // ms between shots
let player, bullets, enemies, particles, muzzleFlash;

function initGame() {
  score = 0;
  level = 1;
  spawnLevel();
}

function spawnLevel() {
  player = {
    x: W / 2, y: H / 2,
    hp: 5, maxHp: 5,
    angle: 0,
    walkFrame: 0,
    walkTimer: 0,
    lastFire: 0,
    invincible: 0,
    radius: 14,
  };
  bullets = [];
  particles = [];
  muzzleFlash = 0;
  spawnEnemiesForLevel();
}

function enemyCountForLevel(lvl) {
  if (lvl <= 6) return [8, 14, 18, 24, 30, 38][lvl - 1];
  return 38 + (lvl - 6) * 8;
}

function spawnEnemiesForLevel() {
  enemies = [];
  const count = enemyCountForLevel(level);
  const types = ['grunt'];
  if (level >= 3) types.push('tank');
  if (level >= 5) types.push('dasher');
  // Spawn enemies off screen
  for (let i = 0; i < count; i++) {
    const type = types[Math.floor(Math.random() * types.length)];
    const side = Math.floor(Math.random() * 4);
    let x, y;
    const margin = 60;
    if (side === 0) { x = Math.random() * W; y = -margin; }
    else if (side === 1) { x = W + margin; y = Math.random() * H; }
    else if (side === 2) { x = Math.random() * W; y = H + margin; }
    else { x = -margin; y = Math.random() * H; }

    // Stagger spawn timing
    enemies.push(createEnemy(type, x, y, i * 120));
  }
}

function createEnemy(type, x, y, spawnDelay) {
  const base = { x, y, type, spawnDelay, spawnTimer: 0, dead: false, deathTimer: 0, hitFlash: 0 };
  if (type === 'grunt') {
    return { ...base, hp: 1, maxHp: 1, speed: 70 + level * 5, radius: 14, score: 10 };
  } else if (type === 'tank') {
    return { ...base, hp: 3, maxHp: 3, speed: 38 + level * 3, radius: 20, score: 30 };
  } else { // dasher
    return { ...base, hp: 1, maxHp: 1, speed: 55 + level * 5, dashTimer: 0, dashCooldown: 2000 + Math.random() * 1000, dashing: false, dashDuration: 0, radius: 12, score: 20 };
  }
}

// --- Particles ---
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 30 + Math.random() * 100;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.03 + Math.random() * 0.04,
      size: 2 + Math.random() * 4,
      color,
    });
  }
}

// --- Drawing helpers ---
function drawGrid() {
  ctx.strokeStyle = '#0a1a0a';
  ctx.lineWidth = 1;
  const gs = 32;
  for (let x = 0; x < W; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += gs) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawVignette() {
  const grad = ctx.createRadialGradient(W/2, H/2, H*0.28, W/2, H/2, H*0.8);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.72)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawPlayer() {
  const p = player;
  ctx.save();
  ctx.translate(p.x, p.y);

  // Invincibility flicker
  if (p.invincible > 0 && Math.floor(p.invincible / 80) % 2 === 0) {
    ctx.restore();
    return;
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(2, 6, 12, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Legs (animated while moving)
  const moving = keys['ArrowUp'] || keys['ArrowDown'] || keys['ArrowLeft'] || keys['ArrowRight'];
  const legOff = moving ? Math.sin(p.walkFrame * 0.18) * 5 : 0;

  ctx.fillStyle = '#1a6';
  // Left leg
  ctx.fillRect(-6, 2 + legOff, 5, 10);
  // Right leg
  ctx.fillRect(1, 2 - legOff, 5, 10);

  // Body
  ctx.fillStyle = '#0f8';
  ctx.beginPath();
  ctx.arc(0, 0, 12, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Face dot
  ctx.fillStyle = '#001a00';
  ctx.beginPath();
  ctx.arc(0, 0, 4, 0, Math.PI * 2);
  ctx.fill();

  // Gun arm (rotates with mouse)
  ctx.rotate(p.angle);
  // Arm
  ctx.fillStyle = '#0c6';
  ctx.fillRect(8, -4, 10, 8);
  // Gun barrel
  ctx.fillStyle = '#888';
  ctx.fillRect(16, -3, 14, 6);
  ctx.fillStyle = '#aaa';
  ctx.fillRect(28, -2, 4, 4);

  // Muzzle flash
  if (muzzleFlash > 0) {
    ctx.fillStyle = `rgba(255, 200, 0, ${muzzleFlash / 6})`;
    ctx.beginPath();
    ctx.arc(34, 0, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `rgba(255,255,255,${muzzleFlash / 8})`;
    ctx.beginPath();
    ctx.arc(34, 0, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawEnemy(e) {
  if (e.spawnTimer < e.spawnDelay) return;
  ctx.save();
  ctx.translate(e.x, e.y);

  const alpha = e.dead ? Math.max(0, 1 - e.deathTimer / 350) : 1;
  const scale = e.dead ? 1 + e.deathTimer / 180 : 1;
  ctx.globalAlpha = alpha;
  ctx.scale(scale, scale);

  const flash = e.hitFlash > 0;

  if (e.type === 'grunt') {
    ctx.fillStyle = flash ? '#fff' : '#e33';
    ctx.strokeStyle = flash ? '#fff' : '#f88';
    ctx.lineWidth = 2;
    // Triangle body
    ctx.beginPath();
    ctx.moveTo(0, -14);
    ctx.lineTo(12, 10);
    ctx.lineTo(-12, 10);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Eye
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(1, 0, 1.5, 0, Math.PI * 2); ctx.fill();
  } else if (e.type === 'tank') {
    ctx.fillStyle = flash ? '#fff' : '#84f';
    ctx.strokeStyle = flash ? '#fff' : '#b8f';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.rect(-18, -18, 36, 36);
    ctx.fill();
    ctx.stroke();
    // HP bar on tank
    const bw = 32, bh = 5;
    ctx.fillStyle = '#333';
    ctx.fillRect(-bw/2, -24, bw, bh);
    ctx.fillStyle = '#f4f';
    ctx.fillRect(-bw/2, -24, bw * (e.hp / e.maxHp), bh);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(-8, -6, 6, 6);
    ctx.fillRect(2, -6, 6, 6);
    ctx.fillStyle = '#000';
    ctx.fillRect(-6, -4, 3, 3);
    ctx.fillRect(4, -4, 3, 3);
  } else { // dasher
    ctx.fillStyle = flash ? '#fff' : (e.dashing ? '#ff8' : '#fa0');
    ctx.strokeStyle = flash ? '#fff' : '#fd4';
    ctx.lineWidth = 2;
    // Diamond
    ctx.beginPath();
    ctx.moveTo(0, -13);
    ctx.lineTo(13, 0);
    ctx.lineTo(0, 13);
    ctx.lineTo(-13, 0);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Eye
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI * 2); ctx.fill();
  }

  ctx.restore();
}

function drawBullet(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.rotate(b.angle);

  // Trail
  for (let i = 1; i <= 3; i++) {
    ctx.globalAlpha = 0.15 * (4 - i) / 3;
    ctx.fillStyle = '#ff0';
    ctx.fillRect(-(i * 6), -2, 8, 4);
  }

  ctx.globalAlpha = 1;
  ctx.fillStyle = '#fff';
  ctx.fillRect(-2, -2, 10, 4);
  ctx.fillStyle = '#ff0';
  ctx.fillRect(0, -1.5, 7, 3);

  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  // HP bar
  const barW = 140, barH = 16;
  ctx.fillStyle = '#111';
  ctx.fillRect(14, 14, barW, barH);
  ctx.fillStyle = player.invincible > 0 ? '#f80' : '#f33';
  ctx.fillRect(14, 14, barW * (player.hp / player.maxHp), barH);
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth = 2;
  ctx.strokeRect(14, 14, barW, barH);
  ctx.fillStyle = '#0ff';
  ctx.font = '10px monospace';
  ctx.fillText('HP', 20, 26);

  // Score
  ctx.fillStyle = '#0ff';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'right';
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur = 10;
  ctx.fillText(`SCORE: ${score}`, W - 14, 30);
  ctx.shadowBlur = 0;
  ctx.textAlign = 'left';

  // Level
  ctx.fillStyle = '#0af';
  ctx.font = 'bold 15px monospace';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#0af';
  ctx.shadowBlur = 8;
  ctx.fillText(`LEVEL ${level}`, W/2, H - 14);
  ctx.shadowBlur = 0;
  ctx.textAlign = 'left';

  // Enemies remaining
  const alive = enemies.filter(e => !e.dead && e.spawnTimer >= e.spawnDelay).length;
  const total = enemies.filter(e => !e.dead).length;
  ctx.fillStyle = '#888';
  ctx.font = '12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`ENEMIES: ${alive}  (${total - alive} incoming)`, W/2, H - 32);
  ctx.textAlign = 'left';
}

function drawLevelClear() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.font = 'bold 52px monospace';
  ctx.fillStyle = '#0ff';
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur = 30;
  ctx.fillText('LEVEL CLEAR', W/2, H/2 - 20);
  ctx.shadowBlur = 0;
  ctx.font = '22px monospace';
  ctx.fillStyle = '#aff';
  ctx.fillText(`SCORE: ${score}`, W/2, H/2 + 24);
  ctx.textAlign = 'left';
}

// --- Update ---
function update(dt, now) {
  if (state === 'LEVEL_CLEAR') {
    levelClearTimer += dt;
    if (levelClearTimer >= LEVEL_CLEAR_DURATION) {
      level++;
      spawnLevel();
      state = 'PLAYING';
    }
    updateParticles(dt);
    return;
  }

  if (state !== 'PLAYING') return;

  updatePlayer(dt, now);
  updateBullets(dt);
  updateEnemies(dt, now);
  updateParticles(dt);
  checkCollisions();
  checkLevelEnd();
}

function updatePlayer(dt, now) {
  const p = player;

  // Movement
  let dx = 0, dy = 0;
  if (keys['ArrowLeft'])  dx -= 1;
  if (keys['ArrowRight']) dx += 1;
  if (keys['ArrowUp'])    dy -= 1;
  if (keys['ArrowDown'])  dy += 1;
  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
  p.x = Math.max(p.radius, Math.min(W - p.radius, p.x + dx * PLAYER_SPEED * dt / 1000));
  p.y = Math.max(p.radius, Math.min(H - p.radius, p.y + dy * PLAYER_SPEED * dt / 1000));

  // Walk animation
  if (dx !== 0 || dy !== 0) {
    p.walkTimer += dt;
    p.walkFrame++;
  }

  // Aim
  p.angle = Math.atan2(mouse.y - p.y, mouse.x - p.x);

  // Fire
  if (mouse.down && now - p.lastFire > FIRE_RATE) {
    p.lastFire = now;
    muzzleFlash = 6;
    const tipX = p.x + Math.cos(p.angle) * 34;
    const tipY = p.y + Math.sin(p.angle) * 34;
    bullets.push({
      x: tipX, y: tipY,
      vx: Math.cos(p.angle) * 620,
      vy: Math.sin(p.angle) * 620,
      angle: p.angle,
      life: 1800,
    });
  }

  if (muzzleFlash > 0) muzzleFlash--;
  if (p.invincible > 0) p.invincible -= dt;
}

function updateBullets(dt) {
  for (const b of bullets) {
    b.x += b.vx * dt / 1000;
    b.y += b.vy * dt / 1000;
    b.life -= dt;
  }
  // Cull
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    if (b.life <= 0 || b.x < -20 || b.x > W+20 || b.y < -20 || b.y > H+20) {
      bullets.splice(i, 1);
    }
  }
}

function updateEnemies(dt, now) {
  for (const e of enemies) {
    e.spawnTimer += dt;
    if (e.spawnTimer < e.spawnDelay) continue;
    if (e.dead) { e.deathTimer += dt; continue; }
    if (e.hitFlash > 0) e.hitFlash -= dt;

    const dx = player.x - e.x;
    const dy = player.y - e.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;

    let speed = e.speed;

    if (e.type === 'dasher') {
      e.dashTimer += dt;
      if (!e.dashing && e.dashTimer > e.dashCooldown) {
        e.dashing = true;
        e.dashDuration = 0;
        e.dashTimer = 0;
      }
      if (e.dashing) {
        e.dashDuration += dt;
        speed *= 3.2;
        if (e.dashDuration > 380) { e.dashing = false; }
      }
    }

    e.x += (dx / dist) * speed * dt / 1000;
    e.y += (dy / dist) * speed * dt / 1000;
  }
  // Remove fully-dead enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    if (enemies[i].dead && enemies[i].deathTimer > 500) {
      enemies.splice(i, 1);
    }
  }
}

function updateParticles(dt) {
  for (const p of particles) {
    p.x += p.vx * dt / 1000;
    p.y += p.vy * dt / 1000;
    p.vx *= 0.92;
    p.vy *= 0.92;
    p.life -= p.decay;
  }
  for (let i = particles.length - 1; i >= 0; i--) {
    if (particles[i].life <= 0) particles.splice(i, 1);
  }
}

function checkCollisions() {
  // Bullet vs enemy
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    const b = bullets[bi];
    let hit = false;
    for (const e of enemies) {
      if (e.dead || e.spawnTimer < e.spawnDelay) continue;
      const dx = b.x - e.x, dy = b.y - e.y;
      if (dx*dx + dy*dy < (e.radius + 4) * (e.radius + 4)) {
        e.hp--;
        e.hitFlash = 120;
        if (e.hp <= 0) {
          e.dead = true;
          score += e.score;
          const colors = e.type === 'grunt' ? ['#f44','#f88'] : e.type === 'tank' ? ['#b4f','#88f'] : ['#ff8','#fa4'];
          spawnParticles(e.x, e.y, colors[0], 6);
          spawnParticles(e.x, e.y, colors[1], 4);
        }
        hit = true;
        break;
      }
    }
    if (hit) bullets.splice(bi, 1);
  }

  // Enemy vs player
  if (player.invincible > 0) return;
  for (const e of enemies) {
    if (e.dead || e.spawnTimer < e.spawnDelay) continue;
    const dx = player.x - e.x, dy = player.y - e.y;
    if (dx*dx + dy*dy < (player.radius + e.radius - 4) * (player.radius + e.radius - 4)) {
      player.hp--;
      player.invincible = 900;
      spawnParticles(player.x, player.y, '#0ff', 5);
      if (player.hp <= 0) {
        spawnParticles(player.x, player.y, '#0f8', 14);
        state = 'GAME_OVER';
        showGameOver();
      }
      break;
    }
  }
}

function checkLevelEnd() {
  if (enemies.length === 0 || enemies.every(e => e.dead)) {
    state = 'LEVEL_CLEAR';
    levelClearTimer = 0;
  }
}

// --- Game Over UI ---
function showGameOver() {
  document.getElementById('goScore').textContent = `SCORE: ${score}`;
  document.getElementById('goLevel').textContent = `LEVEL: ${level}`;
  document.getElementById('gameover').classList.remove('hidden');
}

// --- Main loop ---
let lastTime = 0;
function loop(now) {
  const dt = Math.min(now - lastTime, 50);
  lastTime = now;

  // Clear
  ctx.fillStyle = '#030a03';
  ctx.fillRect(0, 0, W, H);
  drawGrid();

  if (state === 'PLAYING' || state === 'LEVEL_CLEAR' || state === 'GAME_OVER') {
    update(dt, now);

    // Draw enemies (alive, then dying)
    for (const e of enemies) drawEnemy(e);
    drawParticles();
    for (const b of bullets) drawBullet(b);
    if (state !== 'GAME_OVER') drawPlayer();
    drawVignette();
    drawHUD();
    if (state === 'LEVEL_CLEAR') drawLevelClear();
  }

  requestAnimationFrame(loop);
}

// --- UI wiring ---
document.getElementById('btnPlay').addEventListener('click', () => {
  document.getElementById('menu').classList.add('hidden');
  initGame();
  state = 'PLAYING';
});
document.getElementById('btnHow').addEventListener('click', () => {
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('howto').classList.remove('hidden');
});
document.getElementById('btnBack').addEventListener('click', () => {
  document.getElementById('howto').classList.add('hidden');
  document.getElementById('menu').classList.remove('hidden');
});
document.getElementById('btnReplay').addEventListener('click', () => {
  document.getElementById('gameover').classList.add('hidden');
  initGame();
  state = 'PLAYING';
});
document.getElementById('btnMenu').addEventListener('click', () => {
  document.getElementById('gameover').classList.add('hidden');
  document.getElementById('menu').classList.remove('hidden');
  state = 'MENU';
});

requestAnimationFrame(loop);
</script>
</body>
</html>
